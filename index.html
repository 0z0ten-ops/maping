<!DOCTYPE html>
<html>
<head>
<title>リアルタイム地図</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script><style>

    #map { height: 100vh; }
</style>
</head>
<body>
<div id="map"></div>
<script>

  const firebaseConfig = {

    apiKey: "AIzaSyA_bAVs54VH8egBWlLHGXpq-34HNR97PRg",

    authDomain: "map-yoisyo.firebaseapp.com",

    databaseURL: "https://map-yoisyo-default-rtdb.firebaseio.com",

    projectId: "map-yoisyo"

  };

  firebase.initializeApp(firebaseConfig);

  const db = firebase.database();

  const map = L.map('map').setView([35.681, 139.767], 15);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {

    attribution: '&copy; OpenStreetMap'

  }).addTo(map);

  const marker = L.marker([35.681, 139.767]).addTo(map);

  db.ref("location").on("value", (snapshot) => {

    const data = snapshot.val();

  if (!data || data.lat == null || data.lng == null) {
    console.log("データがまだありません");
    return;
  }

    const latlng = [data.lat, data.lng];

    marker.setLatLng(latlng);

    map.setView(latlng);

  });
</script>
</body>
</html>

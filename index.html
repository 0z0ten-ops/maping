<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>史跡マップ</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.js"></script>
<style>
  #map { height: 100vh; }
  .control-panel {
    position: absolute;
    top: 10px; left: 10px;
    background: white; padding: 5px;
    z-index: 1000;
  }
  .control-panel button { margin: 2px; }
</style>
</head>
<body>
<div id="map"></div>
<div class="control-panel">
  <button onclick="setTransport('foot')">徒歩</button>
  <button onclick="setTransport('bike')">自転車</button>
  <button onclick="setTransport('car')">車</button>
  <button onclick="setLanguage('ja')">日本語</button>
  <button onclick="setLanguage('en')">English</button>
</div>
<script>
  // Firebase初期化
  const firebaseConfig = {
    apiKey: "AIzaSyA_bAVs54VH8egBWlLHGXpq-34HNR97PRg",
    authDomain: "map-yoisyo.firebaseapp.com",
    databaseURL: "https://map-yoisyo-default-rtdb.firebaseio.com",
    projectId: "map-yoisyo"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  const map = L.map('map').setView([35.681, 139.767], 13);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
    attribution: '&copy; OpenStreetMap'
  }).addTo(map);

  let markers = [];
  let routingControl = null;
  let transportMode = 'foot';
  let currentLang = 'ja';
  let userMarker = null;
  let nearestMarker = null;
  const profileMap = {foot:'foot', bike:'bicycle', car:'car'};

  // 現在地取得
  if(navigator.geolocation){
    navigator.geolocation.getCurrentPosition(pos=>{
      const latlng = [pos.coords.latitude, pos.coords.longitude];
      userMarker = L.marker(latlng, {title:"現在地"}).addTo(map);
      findNearestMarker();
    });
  }

  function formatDuration(sec){
    const min = Math.floor(sec/60);
    if(min<60) return min + "分";
    const h = Math.floor(min/60);
    const m = min % 60;
    return h + "時間" + m + "分";
  }

  function setTransport(mode){
    transportMode = mode;
    if(nearestMarker) drawRoute(nearestMarker);
  }

  function setLanguage(lang){
    currentLang = lang;
    markers.forEach(m=>{
      const data = m.data;
      const popupText = `<b>${currentLang==='en'?data.name_en:data.name}</b><br>`+
                        `${currentLang==='en'?data.comment_en:data.comment}`;
      m.bindPopup(popupText);
    });
  }

  db.ref("locations").on("value", snapshot=>{
    const data = snapshot.val();
    if(!data) return;

    markers.forEach(m=>map.removeLayer(m));
    markers=[];
    nearestMarker=null;

    Object.values(data).forEach(item=>{
      const colorMap = {
        "展示施設（博物館 等）":"yellow",
        "史跡A（観光名所級）":"darkred",
        "史跡B（小規模）":"lightred",
        "噂":"black",
        "川に関する史跡":"blue"
      };
      const marker = L.circleMarker([item.lat, item.lng], {
        color: colorMap[item.tag]||'green', radius:8, fillOpacity:0.8
      }).addTo(map);

      marker.data = item;

      marker.on('click', ()=>{
        nearestMarker = marker;
        highlightNearest(marker);

        // ルート検索確認
        const message = currentLang==='en'?
          `Do you want to search a route to this location?`:
          `この場所までのルートを検索しますか？`;
        if(confirm(message)){
          drawRoute(marker);
        }
      });

      const popupText = `<b>${currentLang==='en'?item.name_en:item.name}</b><br>`+
                        `${currentLang==='en'?item.comment_en:item.comment}`;
      marker.bindPopup(popupText);

      markers.push(marker);
    });

    findNearestMarker();
    if(nearestMarker){
      const text = currentLang==='en'?'Recommended here!':'おすすめはここです！';
      nearestMarker.bindPopup(`<b>${currentLang==='en'?nearestMarker.data.name_en:nearestMarker.data.name}</b><br>`+
                              `${currentLang==='en'?nearestMarker.data.comment_en:nearestMarker.data.comment}<br>`+
                              `<i>${text}</i>`).openPopup();
    }
  });

  function highlightNearest(marker){
    markers.forEach(m=>m.setStyle({radius:8}));
    marker.setStyle({radius:12});
  }

  function findNearestMarker(){
    if(!userMarker || markers.length===0) return;
    let minDist = Infinity;
    markers.forEach(m=>{
      const d = map.distance(userMarker.getLatLng(), m.getLatLng());
      if(d<minDist){
        minDist=d;
        nearestMarker=m;
      }
    });
    if(nearestMarker) highlightNearest(nearestMarker);
  }

  function drawRoute(marker){
    if(!userMarker) return;
    if(routingControl) map.removeControl(routingControl);

    routingControl = L.Routing.control({
      waypoints: [userMarker.getLatLng(), marker.getLatLng()],
      routeWhileDragging:false,
      show:false,
      lineOptions:{styles:[{color:'blue', opacity:0.7, weight:5}]},
      router:L.Routing.osrmv1({
        serviceUrl:'https://router.project-osrm.org/route/v1',
        profile: profileMap[transportMode]
      }),
      fitSelectedRoutes:true
    }).on('routesfound', e=>{
      const route = e.routes[0];
      const duration = formatDuration(route.summary.totalTime);
      marker.bindPopup(
        `<b>${currentLang==='en'?marker.data.name_en:marker.data.name}</b><br>`+
        `${currentLang==='en'?marker.data.comment_en:marker.data.comment}<br>`+
        `所要時間: ${duration}`
      ).openPopup();
    }).addTo(map);
  }

</script>
</body>
</html>

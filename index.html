<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>史跡マップ</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.css" />

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>
html,body,#map { height:100%; margin:0; }

.panel {
  position:absolute;
  right:10px;
  top:10px;
  z-index:1000;
  background:white;
  padding:8px;
  border-radius:6px;
}

/* ボタン */
button {
  margin:2px;
  padding:5px 8px;
  border:1px solid #ccc;
  background:#f0f0f0;
  cursor:pointer;
}

/* 選択中 */
.active {
  background:#4CAF50;
  color:white;
  border:1px solid #2e7d32;
}
</style>
</head>

<body>

<div class="panel">
  🌐<br>
  <button id="lang-ja" onclick="setLanguage('ja')">JP</button>
  <button id="lang-en" onclick="setLanguage('en')">EN</button><br>
  🚶<br>
  <button id="t-foot" onclick="setTransport('foot')">徒歩</button>
  <button id="t-bike" onclick="setTransport('bike')">自転車</button>
  <button id="t-car" onclick="setTransport('car')">車</button>
</div>

<div id="map"></div>

<script>
// Firebase
const firebaseConfig = {
  apiKey: "AIzaSyA_bAVs54VH8egBWlLHGXpq-34HNR97PRg",
  databaseURL: "https://map-yoisyo-default-rtdb.firebaseio.com"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// Map
const map = L.map('map').setView([35.681,139.767],13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let markers=[];
let userMarker=null;
let routeLine=null;
let routingControl=null;
let nearest=null;
let recommendLabel=null;

let currentLang="ja";
let transport="foot";

// 速度
const speed={foot:4.8,bike:17,car:50};

// 色
const colors={
  "展示施設（博物館 等）":"red",
  "史跡A（観光名所級）":"yellow",
  "史跡B（小規模）":"orange",
  "噂":"purple",
  "川に関する史跡":"blue",
  "その他":"black"
};

// 翻訳
function t(txt){
  const d={
    "おすすめはここです！":"Recommended spot!",
    "ルート表示":"Show route",
    "所要時間":"Time"
  };
  return currentLang==="ja"?txt:(d[txt]||txt);
}

// ボタン状態更新
function updateButtons(){
  document.querySelectorAll("button").forEach(b=>b.classList.remove("active"));

  document.getElementById("lang-"+currentLang).classList.add("active");
  document.getElementById("t-"+transport).classList.add("active");
}

// 距離
function dist(a,b){
  const R=6371;
  const dLat=(b.lat-a.lat)*Math.PI/180;
  const dLng=(b.lng-a.lng)*Math.PI/180;
  const x=Math.sin(dLat/2)**2+
    Math.cos(a.lat*Math.PI/180)*Math.cos(b.lat*Math.PI/180)*Math.sin(dLng/2)**2;
  return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
}

// 時間
function time(a,b){
  const d=dist(a,b);
  const h=d/speed[transport];
  const H=Math.floor(h);
  const M=Math.round((h-H)*60);
  return H>0?`${H}時間${M}分`:`${M}分`;
}

// 言語
function setLanguage(l){
  currentLang=l;
  updateButtons();
}

// 交通
function setTransport(m){
  transport=m;
  updateButtons();
}

// ルート
function drawRoute(from,to){
  if(routeLine){ map.removeLayer(routeLine); }
  if(routingControl){ map.removeControl(routingControl); }

  try{
    routingControl=L.Routing.control({
      waypoints:[from,to],
      show:false,
      router:L.Routing.osrmv1({
        serviceUrl:'https://router.project-osrm.org/route/v1'
      })
    }).on("routingerror",fallback).addTo(map);
  }catch{ fallback(); }

  function fallback(){
    routeLine=L.polyline([from,to],{color:"red"}).addTo(map);
  }
}

// 最寄り
function findNearest(){
  if(!userMarker) return;
  let min=Infinity;
  markers.forEach(m=>{
    const d=dist(userMarker.getLatLng(),m.getLatLng());
    if(d<min){ min=d; nearest=m; }
  });

  if(nearest){
    if(recommendLabel) map.removeLayer(recommendLabel);
    recommendLabel = L.marker(nearest.getLatLng(),{
      icon: L.divIcon({
        className: "",
        html: `<div style="background:yellow;padding:3px;border:1px solid black;">${t("おすすめはここです！")}</div>`
      })
    }).addTo(map);
  }
}

// Firebase
db.ref("locations").on("value",snap=>{
  const data=snap.val();
  if(!data) return;

  markers.forEach(m=>map.removeLayer(m));
  markers=[];

  Object.values(data).forEach(d=>{
    const m=L.circleMarker([d.lat,d.lng],{
      color:colors[d.tag]||"black",
      radius:10
    }).addTo(map);

    m.on("click",()=>{
      if(!userMarker) return alert("現在地が取得できません");

      let msg=`<b>${d.name}</b><br>${d.comment}<br>${d.tag}`;
      msg+=`<br>${t("所要時間")}: ${time(userMarker.getLatLng(),m.getLatLng())}`;
      msg+=`<br><button onclick="goRoute(${d.lat},${d.lng})">${t("ルート表示")}</button>`;

      m.bindPopup(msg).openPopup();
    });

    markers.push(m);
  });

  findNearest();
});

// ルートボタン
function goRoute(lat,lng){
  drawRoute(userMarker.getLatLng(),L.latLng(lat,lng));
}

// 現在地
navigator.geolocation.getCurrentPosition(pos=>{
  const lat=pos.coords.latitude;
  const lng=pos.coords.longitude;
  userMarker=L.marker([lat,lng]).addTo(map).bindPopup("現在地");
  map.setView([lat,lng],15);
  findNearest();
});

// 初期状態
updateButtons();

</script>
</body>
</html>

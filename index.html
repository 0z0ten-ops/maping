<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
  import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyA_bAVs54VH8egBWlLHGXpq-34HNR97PRg",
    authDomain: "map-yoisyo.firebaseapp.com",
    databaseURL: "https://map-yoisyo-default-rtdb.firebaseio.com",
    projectId: "map-yoisyo"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  const map = L.map('map').setView([35.681, 139.767], 15);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap'
  }).addTo(map);

  const marker = L.marker([35.681, 139.767]).addTo(map);

  onValue(ref(db, "location"), (snapshot) => {
    const data = snapshot.val();
    if (!data) return;

    const latlng = [data.lat, data.lng];
    marker.setLatLng(latlng);
    map.setView(latlng);
  });
</script>

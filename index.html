<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>史跡マップ</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.css"/>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>
html, body { height:100%; margin:0; font-family:'Noto Sans JP', sans-serif; background:#f5f0e6; }
#map { height:100%; }

/* タイトルバー */
.header {
  position: fixed;
  top:0; left:0; right:0;
  height:50px;
  background:#d6c3a3;
  display:flex; align-items:center; justify-content:space-between;
  padding:0 20px;
  z-index:1001;
  color:#3e2f1c;
  font-weight:bold;
  box-shadow:0 2px 6px rgba(0,0,0,0.2);
}

/* サイドバー */
.sidebar {
  position: fixed;
  top:50px; left:0;
  width:160px;
  bottom:0;
  background: rgba(245,239,230,0.95);
  padding:10px;
  display:flex;
  flex-direction:column;
  gap:12px;
  z-index:1000;
  box-shadow:2px 0 6px rgba(0,0,0,0.2);
}

/* ボタン */
button {
  border:none;
  border-radius:20px;
  padding:6px 12px;
  background:#c4ae8a;
  color:#3e2f1c;
  font-size:13px;
  cursor:pointer;
  transition:0.2s;
}
button:hover { background:#b89e7a; }
button.active { background:#6f4e37; color:white; }

/* ポップアップ */
.leaflet-popup-content-wrapper {
  border-radius:12px;
  background:#fffaf3;
  color:#3e2f1c;
}

/* おすすめカード */
.recommend-box {
  background: #fffaf3;
  color: #5a3e2b;
  padding: 8px 12px;
  border-radius: 12px;
  border: 1px solid #d6c3a3;
  font-weight:600;
  box-shadow: 0 3px 8px rgba(0,0,0,0.2);
  white-space: nowrap;
  animation: float 2s ease-in-out infinite;
}
.recommend-arrow {
  width:0; height:0;
  border-left:6px solid transparent;
  border-right:6px solid transparent;
  border-top:8px solid #fffaf3;
  margin:0 auto;
}
@keyframes float {
  0% { transform: translateY(0px); }
  50% { transform: translateY(-5px); }
  100% { transform: translateY(0px); }
}

/* メインマップ位置 */
#map { position:absolute; top:50px; left:160px; right:0; bottom:0; }
</style>
</head>

<body>

<div class="header">
  <div>史跡マップ</div>
  <div>
    <button id="lang-ja" onclick="setLanguage('ja')">JP</button>
    <button id="lang-en" onclick="setLanguage('en')">EN</button>
  </div>
</div>

<div class="sidebar">
  <div><b>交通手段</b></div>
  <button id="t-foot" onclick="setTransport('foot')">徒歩</button>
  <button id="t-bike" onclick="setTransport('bike')">自転車</button>
  <button id="t-car" onclick="setTransport('car')">車</button>
  <div id="recommend-panel" style="margin-top:20px;"></div>
</div>

<div id="map"></div>

<script>
// Firebase
const firebaseConfig = {
  apiKey:"AIzaSyA_bAVs54VH8egBWlLHGXpq-34HNR97PRg",
  databaseURL:"https://map-yoisyo-default-rtdb.firebaseio.com"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// Map初期化
const map = L.map('map').setView([35.681,139.767],13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let markers=[], userMarker=null, nearest=null;
let routingControl=null, routeLine=null;
let lang="ja", transport="foot";

const colors={
  "展示施設（博物館 等）":"#a67c52",
  "史跡A（観光名所級）":"#c9a66b",
  "史跡B（小規模）":"#d8b98a",
  "噂":"#8c6f56",
  "川に関する史跡":"#6fa3a6",
  "その他":"#5a4a3f"
};

const speed={foot:4.8,bike:17,car:50};

// UI更新
function updateUI(){
  document.querySelectorAll("button").forEach(b=>b.classList.remove("active"));
  document.getElementById("lang-"+lang).classList.add("active");
  document.getElementById("t-"+transport).classList.add("active");
}

// 言語
function setLanguage(l){ lang=l; updateUI(); updatePopups(); }

// 交通
function setTransport(t){ transport=t; updateUI(); if(routingControl) routingControl.setWaypoints(routingControl.getWaypoints()); }

// 距離
function dist(a,b){
  const R=6371;
  const dLat=(b.lat-a.lat)*Math.PI/180;
  const dLng=(b.lng-a.lng)*Math.PI/180;
  const x=Math.sin(dLat/2)**2+
    Math.cos(a.lat*Math.PI/180)*Math.cos(b.lat*Math.PI/180)*Math.sin(dLng/2)**2;
  return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
}

// 時間
function time(a,b){
  const d=dist(a,b);
  const h=d/speed[transport];
  const H=Math.floor(h);
  const M=Math.round((h-H)*60);
  return H>0?`${H}時間${M}分`:`${M}分`;
}

// ルート
function drawRoute(from,to){
  if(routeLine) map.removeLayer(routeLine);
  if(routingControl) map.removeControl(routingControl);

  try{
    routingControl=L.Routing.control({
      waypoints:[from,to],
      show:false,
      lineOptions:{
        styles:[{color:'#d6c3a3', weight:8, opacity:0.8},{color:'#6f4e37', weight:4, opacity:0.9}]
      }
    }).on("routingerror",()=>{routeLine=L.polyline([from,to],{color:'#a67c52',weight:6,opacity:0.8,dashArray:'6,8'}).addTo(map);}).addTo(map);
  }catch{
    routeLine=L.polyline([from,to],{color:'#a67c52',weight:6,opacity:0.8,dashArray:'6,8'}).addTo(map);
  }
}

// 最寄りおすすめ
function findNearest(){
  if(!userMarker || !markers.length) return;
  let min=Infinity, nearestMarker=null;
  markers.forEach(m=>{
    const d=dist(userMarker.getLatLng(),m.getLatLng());
    if(d<min){min=d; nearestMarker=m;}
  });
  if(nearestMarker){
    const panel=document.getElementById("recommend-panel");
    panel.innerHTML=`<div class="recommend-box">⭐ ${nearestMarker.data.name} まで ${time(userMarker.getLatLng(),nearestMarker.getLatLng())}</div>`;
  }
}

// Firebase
db.ref("locations").on("value",snap=>{
  const data=snap.val();
  if(!data) return;

  markers.forEach(m=>map.removeLayer(m));
  markers=[];

  Object.values(data).forEach(d=>{
    const m=L.circleMarker([d.lat,d.lng],{color:colors[d.tag]||"black", radius:10, fillOpacity:0.9, weight:2}).addTo(map);
    m.data=d;

    m.on("click",()=>{
      if(!userMarker) return alert("現在地取得できません");
      const txt=`<b>${d.name}</b><br>${d.comment}<br>${d.tag}<br>所要時間: ${time(userMarker.getLatLng(),m.getLatLng())}<br><button onclick="go(${d.lat},${d.lng})">ルート</button>`;
      m.bindPopup(txt).openPopup();
    });

    markers.push(m);
  });

  findNearest();
});

// ルートボタン
function go(lat,lng){ drawRoute(userMarker.getLatLng(),L.latLng(lat,lng)); }

// 現在地
navigator.geolocation.getCurrentPosition(pos=>{
  const lat=pos.coords.latitude;
  const lng=pos.coords.longitude;
  userMarker=L.marker([lat,lng]).addTo(map).bindPopup("現在地");
  map.setView([lat,lng],15);
  findNearest();
});

// 初期UI
updateUI();
</script>
</body>
</html>

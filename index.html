<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>史跡マップ</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<style>
  #map { height: 100vh; width: 100%; }
  .transport-btn { position:absolute; top:10px; left:10px; z-index:1000; }
  .transport-btn button { margin-right:5px; }
  #recommend { position:absolute; top:60px; left:10px; z-index:1000; background:white; padding:5px; border-radius:5px; font-weight:bold; }
</style>
</head>
<body>
<div id="map"></div>
<div class="transport-btn">
  <button id="walk">徒歩</button>
  <button id="bike">自転車</button>
  <button id="car">車</button>
</div>
<div id="recommend"></div>

<script>
// Firebase設定
const firebaseConfig = {
  apiKey: "AIzaSyA_bAVs54VH8egBWlLHGXpq-34HNR97PRg",
  authDomain: "map-yoisyo.firebaseapp.com",
  databaseURL: "https://map-yoisyo-default-rtdb.firebaseio.com",
  projectId: "map-yoisyo"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// マップ初期化
const map = L.map('map').setView([35.681, 139.767], 13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; OpenStreetMap'
}).addTo(map);

let transportMode = 'walk';
const speed = { walk: 4.8, bike: 17, car: 50 }; // km/h
let markers = [];
let routeLayer = null;
let currentLocation = null;
let routeTarget = null;
const recommendDiv = document.getElementById('recommend');

// 交通手段切替
document.getElementById('walk').onclick = ()=>{ transportMode='walk'; updateRoute(); };
document.getElementById('bike').onclick = ()=>{ transportMode='bike'; updateRoute(); };
document.getElementById('car').onclick = ()=>{ transportMode='car'; updateRoute(); };

// 現在地取得
if(navigator.geolocation){
  navigator.geolocation.getCurrentPosition(pos=>{
    currentLocation = [pos.coords.latitude, pos.coords.longitude];
    map.setView(currentLocation, 13);
    L.circle(currentLocation, {radius:5, color:'blue'}).addTo(map);
    loadMarkers();
  });
} else {
  alert('現在地を取得できません');
  loadMarkers(); 
}

// カテゴリ簡易翻訳
const categoryMap = {
  "展示施設（博物館 等）":"Exhibition",
  "史跡A（観光名所級）":"Historic A",
  "史跡B（小規模）":"Historic B",
  "噂":"Rumor",
  "川に関する史跡":"River"
};

// 距離計算（Haversine）
function distanceKm(lat1,lng1,lat2,lng2){
  const R = 6371;
  const dLat = (lat2-lat1)*Math.PI/180;
  const dLng = (lng2-lng1)*Math.PI/180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  const c = 2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
  return R*c;
}

// 所要時間計算
function calcTime(distKm,mode){
  const t = distKm / speed[mode] * 60;
  if(t>60){
    const h = Math.floor(t/60);
    const m = Math.round(t%60);
    return `${h}時間${m}分`;
  }
  return `${Math.round(t)}分`;
}

// ルート表示（直線）
function updateRoute(){
  if(routeLayer) map.removeLayer(routeLayer);
  if(!currentLocation || !routeTarget) return;
  routeLayer = L.polyline([currentLocation, routeTarget], {color:'blue'}).addTo(map);
  const dist = distanceKm(currentLocation[0], currentLocation[1], routeTarget[0], routeTarget[1]);
  const time = calcTime(dist, transportMode);
  recommendDiv.innerHTML = `おすすめはここです！<br>距離: ${dist.toFixed(2)} km, 所要時間: ${time}`;
}

// マーカー読み込み
function loadMarkers(){
  db.ref("locations").on("value",(snapshot)=>{
    const data = snapshot.val();
    if(!data) return;

    markers.forEach(m=>map.removeLayer(m));
    markers = [];

    let nearest = null;
    let nearestDist = Infinity;

    Object.values(data).forEach(item=>{
      const cat = categoryMap[item.category] || item.category || "";
      const popupContent = `<b>${item.name}</b><br>${cat}<br>${item.comment || ""}<br><i>This comment is in Japanese</i><br>
        <button onclick="showRoute(${item.lat},${item.lng})">ルートを表示</button>`;
      const marker = L.marker([item.lat,item.lng]).addTo(map).bindPopup(popupContent);
      markers.push(marker);

      if(currentLocation){
        const d = distanceKm(currentLocation[0], currentLocation[1], item.lat,item.lng);
        if(d<nearestDist){
          nearestDist=d;
          nearest=item;
        }
      }
    });

    if(nearest && currentLocation){
      routeTarget = [nearest.lat, nearest.lng];
      updateRoute();
    }
  });
}

// ルートボタン
function showRoute(lat,lng){
  routeTarget=[lat,lng];
  updateRoute();
}
</script>
</body>
</html>

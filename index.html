<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>史跡マップ</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<style>
  #map { height: 100vh; width: 100%; }
  #control-panel {
    position: absolute; top: 10px; left: 10px; z-index: 1000; 
    background: white; padding: 8px; border-radius: 4px;
    font-family: sans-serif;
  }
</style>
</head>
<body>
<div id="control-panel">
  <label>交通手段：
    <select id="transport">
      <option value="walk">徒歩</option>
      <option value="bike">自転車</option>
      <option value="car">車</option>
    </select>
  </label>
</div>
<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyA_bAVs54VH8egBWlLHGXpq-34HNR97PRg",
  authDomain: "map-yoisyo.firebaseapp.com",
  databaseURL: "https://map-yoisyo-default-rtdb.firebaseio.com",
  projectId: "map-yoisyo"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const map = L.map('map').setView([35.681, 139.767], 13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '&copy; OpenStreetMap' }).addTo(map);

// タグごとの色設定
const tagColorMap = {
  "展示施設（博物館 等）": "red",
  "史跡A（観光名所級）": "yellow",
  "史跡B（小規模）": "orange",
  "噂": "purple",
  "川に関する史跡": "blue",
  "その他": "black"
};

let markers = [];
let routeLine = null;

// 交通手段ごとの速度 (km/h)
const speedMap = { walk: 4.8, bike: 17, car: 50 };
const transportSelect = document.getElementById("transport");

function computeTime(lat1, lng1, lat2, lng2, transport) {
  // 緯度経度をkmに変換（簡易）
  const R = 6371; // 地球半径 km
  const dLat = (lat2-lat1)*Math.PI/180;
  const dLng = (lng2-lng1)*Math.PI/180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  const distance = R * c; // km
  const timeH = distance / speedMap[transport];
  const h = Math.floor(timeH);
  const m = Math.round((timeH - h)*60);
  if(h>0) return `${h}時間${m}分`;
  return `${m}分`;
}

// Firebase locations ノード監視
db.ref("locations").on("value", snapshot => {
  const data = snapshot.val();
  if(!data) return;

  markers.forEach(m=>map.removeLayer(m));
  markers = [];

  const items = Object.values(data);
  const latestItem = items[items.length-1]; // 最新をおすすめとする

  items.forEach(item=>{
    const color = tagColorMap[item.tag] || tagColorMap["その他"];
    const marker = L.circleMarker([item.lat, item.lng], { color: color, radius: 8 }).addTo(map);
    
    const isRecommended = (item===latestItem);
    let popupContent = `<b>${item.name}</b><br>タグ: ${item.tag}<br>${item.comment || ''}`;
    if(isRecommended) popupContent += `<br><b>おすすめはここです！</b>`;
    
    marker.bindPopup(popupContent);

    marker.on("click", ()=>{
      // 選択された交通手段で時間計算
      const transport = transportSelect.value;
      const timeStr = computeTime(35.681, 139.767, item.lat, item.lng, transport);
      marker.setPopupContent(popupContent + `<br>所要時間（${transport}）：${timeStr}`);
      
      // 簡易ルート表示（直線）
      if(routeLine) map.removeLayer(routeLine);
      routeLine = L.polyline([[35.681, 139.767],[item.lat,item.lng]], { color: "green" }).addTo(map);
    });

    markers.push(marker);
  });
});
</script>
</body>
</html>
